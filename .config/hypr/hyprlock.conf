# hyprlock config

source = /home/bautistaaa/.config/hypr/themes/current-hyprlock.conf
$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

auth {
    pam:enabled = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/bautistaaa/.cache/dotfiles/theme/current-wallpaper
    color = $lock_bg
}

label {
    monitor =
    text = $TIME12
    color = $lock_accent
    font_size = 56
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = $lock_muted
    font_size = 22
    font_family = $font

    position = -30, -78
    halign = right
    valign = top
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = $lock_outer
    check_color = $lock_check
    fail_color = $lock_fail

    font_color = $lock_text
    font_family = $font
    fade_on_empty = false
    rounding = 15
    placeholder_text = Enter password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}
